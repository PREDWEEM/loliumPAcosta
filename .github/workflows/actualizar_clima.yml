name: Actualizar Datos Meteorológicos Azul

# Cuándo se va a ejecutar esto:
on:
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"
  schedule:
    - cron: '0 12 * * *' # Opcional: Se ejecuta automáticamente todos los días a las 12:00 UTC

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Ejecutar script de descarga
        run: python descargar_clima_azul.py

      - name: Hacer commit y push de los cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add meteo_daily_azul_real.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de datos meteorológicos" && git push)
